name: AMC Odyssey Monitor

on:
  schedule:
    - cron: "*/10 * * * *"

  workflow_dispatch:


jobs:
  monitor:

    runs-on: ubuntu-latest


    steps:

      - name: Checkout code
        uses: actions/checkout@v4


      - name: Restore state
        uses: actions/cache@v4
        with:
          path: last_seen.json
          key: odyssey-state


      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"


      - name: Install dependencies
        run: |
          pip install -r requirements.txt


      - name: Run monitor
        env:
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          python monitor.py